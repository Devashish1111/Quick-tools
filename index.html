<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Primary SEO -->
    <title>QuickToolbox — 25 Free Online Tools for Developers &amp; Designers</title>
    <meta name="description" content="25 free browser tools: URL shortener, QR code generator, password generator, JSON formatter, regex tester, markdown preview, and more. Instant, private, no signup required." />
    <meta name="keywords" content="free online tools, URL shortener, QR code generator, password generator, JSON formatter, regex tester, markdown preview, base64 encoder, UUID generator, hash generator, CSS gradient generator, color converter, pomodoro timer, IP lookup, word counter" />
    <meta name="author" content="QuickToolbox" />
    <meta name="robots" content="index, follow" />
    <link rel="canonical" href="https://quicktoolbox.app/" />

    <!-- Open Graph / Facebook -->
    <meta property="og:type"        content="website" />
    <meta property="og:url"         content="https://quicktoolbox.app/" />
    <meta property="og:title"       content="QuickToolbox — 25 Free Online Tools" />
    <meta property="og:description" content="URL shortener, QR codes, passwords, JSON formatter, regex tester, markdown preview &amp; 19 more tools. All free. No signup. Private." />
    <meta property="og:image"       content="https://quicktoolbox.app/og-image.png" />
    <meta property="og:site_name"   content="QuickToolbox" />
    <meta property="og:locale"      content="en_US" />

    <!-- Twitter Card -->
    <meta name="twitter:card"        content="summary_large_image" />
    <meta name="twitter:site"        content="@quicktoolbox" />
    <meta name="twitter:title"       content="QuickToolbox — 25 Free Online Tools" />
    <meta name="twitter:description" content="URL shortener, QR codes, passwords, JSON formatter, regex tester &amp; more. Private, instant, free." />
    <meta name="twitter:image"       content="https://quicktoolbox.app/og-image.png" />

    <!-- Theme / PWA -->
    <meta name="theme-color" content="#09090E" />
    <meta name="msapplication-TileColor" content="#09090E" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />

    <!-- Structured Data: WebApplication -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "WebApplication",
      "name": "QuickToolbox",
      "url": "https://quicktoolbox.app",
      "description": "25 free browser-based tools for developers, designers, and writers. URL shortener, QR code generator, password generator, JSON formatter, regex tester, markdown preview, and more.",
      "applicationCategory": "UtilitiesApplication",
      "operatingSystem": "Any",
      "offers": {
        "@type": "Offer",
        "price": "0",
        "priceCurrency": "USD"
      },
      "featureList": [
        "URL Shortener", "QR Code Generator", "Password Generator",
        "JSON Formatter", "Regex Tester", "Markdown Preview",
        "Base64 Encoder/Decoder", "UUID Generator", "Hash Generator",
        "Color Converter", "CSS Gradient Generator", "Pomodoro Timer",
        "IP Info Lookup", "Word Counter", "Case Converter"
      ]
    }

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800;900&family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap"

    />
